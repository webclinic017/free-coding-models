<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <title>free-coding-models — Find the fastest free coding model in seconds</title>
    <meta name="description" content="Track ~170 coding models across ~15 trusted free or free-limited AI providers in real time. Install free API endpoints to OpenCode, Crush, Goose, Aider, Cline, and more." />
    <script>
      // Apply theme before first paint — prevents flash
      (function () {
        var t = localStorage.getItem("fcm-theme") || "auto";
        var dark = t === "dark" || (t === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (!dark) document.documentElement.classList.add("light");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
